name: Lint

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: npm install -g corepack

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26.x
          cache: yarn

      - run: corepack yarn install --immutable
      - run: corepack yarn run biome ci
